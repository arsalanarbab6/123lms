<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mark Attendance | CyberEdge Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/app.js"></script>
<style>
body{font-family:'Manrope',sans-serif}.headline{font-family:'Space Grotesk',sans-serif}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.sig-grad{background:linear-gradient(135deg,#007BFF 0%,#00C896 100%)}
.sl{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:.75rem;font-weight:600;font-size:.875rem;color:#94a3b8;transition:all .15s}
.sl:hover{background:rgba(255,255,255,.08);color:#fff}.sl.active{background:rgba(255,255,255,.12);color:#fff}
.status-btn{padding:.4rem .8rem;border-radius:.5rem;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s}
</style>
</head>
<body class="bg-[#f8f9ff]">
<div class="flex min-h-screen">
<aside class="hidden md:flex flex-col h-screen sticky top-0 w-64 bg-[#0A2540] py-6">
  <div class="px-6 mb-8"><p class="headline font-black text-xl text-white">Instructor Portal</p></div>
  <nav class="flex-1 px-3 space-y-1">
    <a href="/instructor/dashboard.html"     class="sl"><span class="material-symbols-outlined">grid_view</span>Dashboard</a>
    <a href="/instructor/my-courses.html"    class="sl"><span class="material-symbols-outlined">auto_stories</span>My Courses</a>
    <a href="/instructor/students.html"      class="sl"><span class="material-symbols-outlined">people</span>Students</a>
    <a href="/instructor/assignments.html"   class="sl"><span class="material-symbols-outlined">assignment</span>Assignments</a>
    <a href="/instructor/attendance.html"    class="sl active"><span class="material-symbols-outlined">event_available</span>Attendance</a>
    <a href="/instructor/sessions.html"      class="sl"><span class="material-symbols-outlined">video_call</span>Sessions</a>
    <a href="/instructor/announcements.html" class="sl"><span class="material-symbols-outlined">campaign</span>Announcements</a>
  </nav>
  <div class="px-3 mt-auto border-t border-white/10 pt-4">
    <button onclick="signOut()" class="sl w-full text-left text-red-400 hover:bg-red-900/20"><span class="material-symbols-outlined">logout</span>Logout</button>
  </div>
</aside>

<main class="flex-1 p-8">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="headline text-3xl font-bold text-[#0A2540]">Attendance Management</h1>
      <p class="text-slate-400 mt-1">Mark today's session attendance for your students.</p>
    </div>
  </div>

  <!-- Controls -->
  <div class="bg-white rounded-2xl border border-slate-100 p-6 mb-6 grid md:grid-cols-3 gap-4">
    <div>
      <label class="text-xs font-bold uppercase text-slate-500 block mb-2">Select Course *</label>
      <select id="att-course" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#007BFF]" onchange="loadStudents()">
        <option value="">-- Choose course --</option>
      </select>
    </div>
    <div>
      <label class="text-xs font-bold uppercase text-slate-500 block mb-2">Session Date</label>
      <input id="att-date" type="date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#007BFF]"/>
    </div>
    <div>
      <label class="text-xs font-bold uppercase text-slate-500 block mb-2">Session Title</label>
      <input id="att-title" type="text" placeholder="e.g. Week 3 - Core Concepts" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#007BFF]"/>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="flex gap-3 mb-6 flex-wrap" id="quick-actions" style="display:none!important">
    <button onclick="markAll('present')" class="bg-[#f0fff8] text-[#009e76] font-bold px-5 py-2.5 rounded-xl text-sm border border-[#009e76]/20">✓ Mark All Present</button>
    <button onclick="markAll('absent')"  class="bg-red-50 text-red-400 font-bold px-5 py-2.5 rounded-xl text-sm border border-red-200">✗ Mark All Absent</button>
  </div>

  <!-- Student list -->
  <div id="student-att-list" class="space-y-3 mb-8">
    <div class="bg-white rounded-2xl border border-slate-100 p-12 text-center text-slate-400">
      Select a course to load students.
    </div>
  </div>

  <p id="att-err" class="text-red-500 text-sm hidden mb-3"></p>
  <p id="att-suc" class="text-[#009e76] text-sm hidden mb-3"></p>

  <button id="save-att-btn" onclick="saveAttendance()" class="hidden sig-grad text-white headline font-bold px-8 py-4 rounded-xl shadow-xl hover:scale-[1.02] transition-all flex items-center gap-2">
    <span class="material-symbols-outlined">save</span> Save Attendance
  </button>
</main>
</div>

<div id="toast" class="fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl font-bold text-sm text-white opacity-0 transition-opacity pointer-events-none"></div>

<script>
let currentUser, attendanceMap = {};

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.background=type==='success'?'#00C896':'#ef4444';
  t.style.opacity='1'; setTimeout(()=>{t.style.opacity='0';},3000);
}

async function init() {
  const auth = await requireRole(['admin','instructor'],'/student/dashboard.html');
  if (!auth) return;
  currentUser = auth.user;
  // Set today's date
  document.getElementById('att-date').value = new Date().toISOString().split('T')[0];
  // Load courses
  const { data: courses } = await sb.from('courses').select('id,title').order('title');
  const sel = document.getElementById('att-course');
  (courses||[]).forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.title;sel.appendChild(o);});
}

async function loadStudents() {
  const courseId = document.getElementById('att-course').value;
  if (!courseId) return;
  attendanceMap = {};

  const { data: enrollments } = await sb.from('enrollments')
    .select('student_id, profiles!student_id(id,full_name,email)')
    .eq('course_id', courseId).eq('status','active');

  const list = document.getElementById('student-att-list');
  if (!enrollments?.length) {
    list.innerHTML = `<div class="bg-white rounded-2xl border border-slate-100 p-12 text-center text-slate-400">No active students enrolled in this course.</div>`;
    document.getElementById('save-att-btn').classList.add('hidden');
    return;
  }

  document.getElementById('quick-actions').style.removeProperty('display');
  document.getElementById('save-att-btn').classList.remove('hidden');

  list.innerHTML = enrollments.map((e,i) => {
    attendanceMap[e.student_id] = 'present'; // default
    return `
    <div class="bg-white rounded-2xl border border-slate-100 p-5 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl sig-grad flex items-center justify-center text-white font-bold headline text-sm">
          ${(e.profiles?.full_name||e.profiles?.email||'?')[0].toUpperCase()}
        </div>
        <div>
          <p class="font-bold text-[#0A2540]">${e.profiles?.full_name||'-'}</p>
          <p class="text-xs text-slate-400">${e.profiles?.email||''}</p>
        </div>
      </div>
      <div class="flex gap-2" id="btn-group-${e.student_id}">
        <button onclick="setStatus('${e.student_id}','present')" class="status-btn bg-[#f0fff8] text-[#009e76] border border-[#009e76]/30 selected-present">Present</button>
        <button onclick="setStatus('${e.student_id}','absent')"  class="status-btn bg-slate-50 text-slate-400 border border-slate-200">Absent</button>
        <button onclick="setStatus('${e.student_id}','late')"    class="status-btn bg-yellow-50 text-yellow-600 border border-yellow-200">Late</button>
      </div>
    </div>`;
  }).join('');
}

function setStatus(studentId, status) {
  attendanceMap[studentId] = status;
  const grp = document.getElementById(`btn-group-${studentId}`);
  grp.querySelectorAll('.status-btn').forEach(b => {
    b.classList.remove('ring-2','ring-[#009e76]','ring-red-400','ring-yellow-400');
    b.style.opacity = '0.5';
  });
  const active = grp.querySelector(`.status-btn:nth-child(${status==='present'?1:status==='absent'?2:3})`);
  active.style.opacity = '1';
  active.classList.add(`ring-2`, status==='present'?'ring-[#009e76]':status==='absent'?'ring-red-400':'ring-yellow-400');
}

function markAll(status) {
  Object.keys(attendanceMap).forEach(id => setStatus(id, status));
}

async function saveAttendance() {
  const courseId = document.getElementById('att-course').value;
  const date = document.getElementById('att-date').value;
  const title = document.getElementById('att-title').value.trim();
  const errEl = document.getElementById('att-err');
  const sucEl = document.getElementById('att-suc');
  errEl.classList.add('hidden'); sucEl.classList.add('hidden');

  if (!courseId || !date) { errEl.textContent='Please select course and date.'; errEl.classList.remove('hidden'); return; }

  const records = Object.entries(attendanceMap).map(([student_id, status]) => ({
    student_id, course_id:courseId, session_date:date, session_title:title||'Session', status, marked_by:currentUser.id
  }));

  const btn = document.getElementById('save-att-btn'); btn.disabled=true; btn.textContent='Saving...';

  // Upsert (update if already marked today)
  const { error } = await sb.from('attendance').upsert(records, { onConflict:'student_id,course_id,session_date' });
  btn.disabled=false; btn.innerHTML='<span class="material-symbols-outlined">save</span> Save Attendance';

  if (error) { errEl.textContent=error.message; errEl.classList.remove('hidden'); return; }

  sucEl.textContent = `Attendance saved for ${records.length} students!`; sucEl.classList.remove('hidden');
  showToast('Attendance saved successfully!');
  setTimeout(()=>sucEl.classList.add('hidden'), 4000);
}

init();
</script>
</body>
</html>
