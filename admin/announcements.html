<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Announcements | CyberEdge Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/app.js"></script>
<style>body{font-family:'Manrope',sans-serif}.headline{font-family:'Space Grotesk',sans-serif}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.sig-grad{background:linear-gradient(135deg,#007BFF 0%,#00C896 100%)}.sl{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:.75rem;font-weight:600;font-size:.875rem;color:#94a3b8;transition:all .15s}.sl:hover{background:rgba(255,255,255,.08);color:#fff}.sl.active{background:rgba(255,255,255,.12);color:#fff}</style>
</head>
<body class="bg-[#f8f9ff]">
<div class="flex min-h-screen">
<aside class="hidden md:flex flex-col h-screen sticky top-0 w-64 bg-[#0A2540] py-6">
  <div class="px-6 mb-8"><a href="/public/index.html" class="headline font-black text-xl text-white block">CyberEdge Admin</a></div>
  <nav class="flex-1 px-3 space-y-1">
    <a href="/admin/dashboard.html"     class="sl"><span class="material-symbols-outlined">grid_view</span>Dashboard</a>
    <a href="/admin/courses.html"       class="sl"><span class="material-symbols-outlined">menu_book</span>Courses</a>
    <a href="/admin/users.html"         class="sl"><span class="material-symbols-outlined">people</span>Users</a>
    <a href="/admin/applications.html"  class="sl"><span class="material-symbols-outlined">assignment_ind</span>Applications</a>
    <a href="/admin/attendance.html"    class="sl"><span class="material-symbols-outlined">event_available</span>Attendance</a>
    <a href="/admin/announcements.html" class="sl active"><span class="material-symbols-outlined">campaign</span>Announcements</a>
    <a href="/admin/analytics.html"     class="sl"><span class="material-symbols-outlined">insights</span>Analytics</a>
    <a href="/admin/settings.html"      class="sl"><span class="material-symbols-outlined">settings</span>Settings</a>
  </nav>
  <div class="px-3 mt-auto border-t border-white/10 pt-4"><button onclick="signOut()" class="sl w-full text-left text-red-400 hover:bg-red-900/20"><span class="material-symbols-outlined">logout</span>Logout</button></div>
</aside>
<main class="flex-1 p-8">
  <div class="mb-8"><h1 class="headline text-3xl font-bold text-[#0A2540]">Announcements</h1><p class="text-slate-400 mt-1">Send platform-wide or course-specific notifications.</p></div>
  <div class="grid lg:grid-cols-2 gap-8">
    <div class="bg-white rounded-2xl border border-slate-100 p-8 shadow-sm">
      <h3 class="headline text-xl font-bold text-[#0A2540] mb-6 flex items-center gap-2"><span class="material-symbols-outlined text-[#007BFF]">edit_note</span>Compose</h3>
      <div class="space-y-4">
        <div><label class="text-xs font-bold uppercase text-slate-500 block mb-2">Title *</label><input id="ann-t" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#007BFF]"/></div>
        <div><label class="text-xs font-bold uppercase text-slate-500 block mb-2">Message *</label><textarea id="ann-m" rows="4" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl resize-none focus:outline-none focus:border-[#007BFF]"></textarea></div>
        <div><label class="text-xs font-bold uppercase text-slate-500 block mb-2">Category</label><select id="ann-c" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#007BFF]"><option value="system">General / System</option><option value="alert">Alert / Urgent</option><option value="course">Course Update</option></select></div>
        <label class="flex items-center gap-3 cursor-pointer p-4 rounded-xl hover:bg-[#eff4ff] border border-[#dce9ff]"><input type="checkbox" id="ann-global" class="w-5 h-5 accent-[#007BFF]" checked/><div><p class="font-bold text-sm text-[#0A2540]">Global Broadcast</p><p class="text-xs text-slate-400">Sends notification to ALL students</p></div></label>
        <p id="ann-err" class="text-red-500 text-sm hidden"></p>
        <p id="ann-suc" class="text-[#009e76] text-sm hidden"></p>
        <button onclick="send()" class="w-full sig-grad text-white headline font-bold py-4 rounded-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-2" id="send-btn"><span class="material-symbols-outlined">send</span>Send Announcement</button>
      </div>
    </div>
    <div><h3 class="headline font-bold text-[#0A2540] mb-4">Recent Announcements</h3><div id="ann-list" class="space-y-4"><p class="text-slate-400 text-center py-8">Loading...</p></div></div>
  </div>
</main>
</div>
<div id="toast" class="fixed bottom-6 right-6 z-50 px-6 py-3 rounded-xl font-bold text-sm text-white opacity-0 transition-opacity pointer-events-none"></div>
<script>
let cu;
function showToast(m,t='success'){const el=document.getElementById('toast');el.textContent=m;el.style.background=t==='success'?'#00C896':'#ef4444';el.style.opacity='1';setTimeout(()=>{el.style.opacity='0';},3000);}
async function init(){const a=await requireRole(['admin'],'/student/dashboard.html');if(!a)return;cu=a.user;load();}
async function load(){const{data}=await sb.from('announcements').select('*, profiles!created_by(full_name)').order('created_at',{ascending:false}).limit(15);const l=document.getElementById('ann-list');const cc={course:'text-[#007BFF] bg-[#eff4ff]',alert:'text-red-500 bg-red-50',system:'text-slate-500 bg-slate-100'};l.innerHTML=data?.length?data.map(a=>`<div class="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm"><div class="flex justify-between items-start mb-2"><h4 class="headline font-bold text-[#0A2540]">${a.title}</h4><span class="text-[10px] font-bold px-2 py-1 rounded-full ${cc[a.category]||cc.system}">${a.category}</span></div><p class="text-sm text-slate-600">${a.message||''}</p><p class="text-xs text-slate-400 mt-2">${new Date(a.created_at).toLocaleString()}</p></div>`).join(''):'<p class="text-slate-400 text-center py-8">No announcements yet.</p>';}
async function send(){const t=document.getElementById('ann-t').value.trim();const m=document.getElementById('ann-m').value.trim();const c=document.getElementById('ann-c').value;const g=document.getElementById('ann-global').checked;const err=document.getElementById('ann-err');const suc=document.getElementById('ann-suc');err.classList.add('hidden');suc.classList.add('hidden');if(!t||!m){err.textContent='Title and message required.';err.classList.remove('hidden');return;}const btn=document.getElementById('send-btn');btn.disabled=true;btn.textContent='Sending...';await sb.from('announcements').insert({title:t,message:m,category:c,created_by:cu.id,is_global:g});let cnt=0;if(g){const{data:ss}=await sb.from('profiles').select('id').eq('role','student');if(ss?.length){const ns=ss.map(s=>({user_id:s.id,title:t,message:m,category:c}));for(let i=0;i<ns.length;i+=100)await sb.from('notifications').insert(ns.slice(i,i+100));cnt=ss.length;}}btn.disabled=false;btn.innerHTML='<span class="material-symbols-outlined">send</span>Send Announcement';document.getElementById('ann-t').value='';document.getElementById('ann-m').value='';suc.textContent='Sent to '+cnt+' students!';suc.classList.remove('hidden');showToast('Announcement sent!');load();}
init();
</script>
</body>
</html>
