<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password | CyberEdge Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/app.js"></script>
<style>
  body{font-family:'Manrope',sans-serif}
  .headline{font-family:'Space Grotesk',sans-serif}
  .sig-grad{background:linear-gradient(135deg,#007BFF 0%,#00C896 100%)}
</style>
</head>
<body class="bg-[#f8f9ff] min-h-screen flex flex-col">

<header class="bg-[#f8f9ff] sticky top-0 z-50 border-b border-[#c4c6ce]/15">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="/public/index.html" class="headline font-black text-2xl text-[#0A2540]">CyberEdge Academy</a>
    <a href="/public/faqs.html" class="flex items-center gap-1 text-[#007BFF] font-bold text-sm">Support</a>
  </div>
</header>

<main class="flex-grow flex items-center justify-center px-6 py-12 relative">
  <!-- background watermark -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden select-none">
    <span class="headline font-black text-[20vw] leading-none text-[#e5eeff] opacity-40 -rotate-12 tracking-tighter">SEC</span>
  </div>

  <div class="w-full max-w-lg z-10">
    <div class="bg-white rounded-2xl shadow-2xl p-8 md:p-12 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1.5 sig-grad"></div>
      <h1 class="headline text-4xl font-bold text-[#000f22] mb-3">Update Password</h1>
      <p class="text-[#43474d] mb-8">Choose a strong new password for your CyberEdge account.</p>

      <form id="resetForm" class="space-y-6">
        <div>
          <label class="text-sm font-bold tracking-widest text-[#43474d] uppercase">New Password</label>
          <input id="newPass" type="password" required minlength="6" placeholder="Min. 6 characters"
            class="w-full mt-1 bg-[#eff4ff] border border-[#c4c6ce]/15 rounded-lg px-5 py-4 focus:ring-4 focus:ring-[#0059bb]/10 focus:border-[#0059bb] outline-none transition-all"/>
        </div>

        <!-- strength bar -->
        <div class="p-5 bg-[#eff4ff] rounded-xl space-y-3">
          <div class="flex justify-between items-end">
            <span class="text-[10px] font-bold tracking-widest text-[#43474d] uppercase">Password Strength</span>
            <span id="strength-label" class="headline text-sm font-bold italic text-[#43474d]">WEAK</span>
          </div>
          <div class="h-2 w-full bg-[#dce9ff] rounded-full overflow-hidden">
            <div id="strength-bar" class="h-full sig-grad transition-all duration-300" style="width:10%"></div>
          </div>
        </div>

        <div>
          <label class="text-sm font-bold tracking-widest text-[#43474d] uppercase">Confirm Password</label>
          <input id="confirmPass" type="password" required placeholder="Repeat password"
            class="w-full mt-1 bg-[#eff4ff] border border-[#c4c6ce]/15 rounded-lg px-5 py-4 focus:ring-4 focus:ring-[#0059bb]/10 focus:border-[#0059bb] outline-none transition-all"/>
          <p id="match-msg" class="text-xs font-bold mt-1 hidden"></p>
        </div>

        <p id="err" class="text-red-500 text-sm hidden"></p>
        <p id="suc" class="text-green-600 text-sm hidden"></p>

        <button type="submit" id="submitBtn"
          class="w-full sig-grad text-white py-5 rounded-lg headline font-bold tracking-wider text-lg shadow-xl hover:scale-[1.02] active:scale-[.98] transition-all flex items-center justify-center gap-3">
          Update Password
          <span style="font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">rocket_launch</span>
        </button>
        <a href="/public/login.html" class="block text-center text-sm text-[#43474d] hover:text-[#007BFF]">Cancel — return to Sign In</a>
      </form>
    </div>
  </div>
</main>

<script>
// Strength meter
const newPass = document.getElementById("newPass");
const bar = document.getElementById("strength-bar");
const label = document.getElementById("strength-label");
newPass.addEventListener("input", () => {
  const v = newPass.value;
  let score = 0;
  if (v.length >= 6)  score++;
  if (v.length >= 12) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const pct = Math.max(10, score * 25);
  bar.style.width = pct + "%";
  const labels = ["WEAK","FAIR","FAIR","GOOD","OPTIMIZED"];
  label.textContent = labels[score];
  label.style.color = score >= 3 ? "#009e76" : "#43474d";
});

const confirmPass = document.getElementById("confirmPass");
confirmPass.addEventListener("input", () => {
  const m = document.getElementById("match-msg");
  if (!confirmPass.value) { m.classList.add("hidden"); return; }
  m.classList.remove("hidden");
  if (confirmPass.value === newPass.value) {
    m.textContent = "Passwords match ✓"; m.style.color = "#009e76";
  } else {
    m.textContent = "Passwords do not match"; m.style.color = "#ef4444";
  }
});

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = document.getElementById("err");
  const suc = document.getElementById("suc");
  const btn = document.getElementById("submitBtn");
  err.classList.add("hidden"); suc.classList.add("hidden");

  if (newPass.value !== confirmPass.value) {
    err.textContent = "Passwords do not match."; err.classList.remove("hidden"); return;
  }

  btn.disabled = true; btn.textContent = "Updating...";
  const { error } = await sb.auth.updateUser({ password: newPass.value });
  btn.disabled = false; btn.textContent = "Update Password";

  if (error) {
    err.textContent = error.message; err.classList.remove("hidden");
  } else {
    suc.textContent = "Password updated! Redirecting to login..."; suc.classList.remove("hidden");
    setTimeout(() => window.location.href = "/public/login.html", 2000);
  }
});
</script>
</body>
</html>
