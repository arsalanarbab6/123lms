<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password | CyberEdge Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/app.js"></script>
<style>
  body{font-family:'Manrope',sans-serif}
  .headline{font-family:'Space Grotesk',sans-serif}
  .sig-grad{background:linear-gradient(135deg,#007BFF 0%,#00C896 100%)}
  .deep-mesh{background-color:#000f22;background-image:radial-gradient(at 0% 0%,hsla(210,100%,15%,1) 0,transparent 50%),radial-gradient(at 100% 0%,hsla(220,100%,10%,1) 0,transparent 50%),radial-gradient(at 50% 100%,hsla(160,100%,10%,1) 0,transparent 50%)}
</style>
</head>
<body class="min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center p-6 deep-mesh">
  <div class="w-full max-w-md">
    <a href="/public/index.html" class="block text-center headline font-black text-4xl text-white mb-2">CyberEdge Academy</a>
    <p class="text-center text-[#768dad] text-sm uppercase tracking-wider mb-10">Secure Government Portal</p>

    <div class="bg-[#0a2540] rounded-xl p-8 shadow-2xl border border-white/5">
      <h2 class="headline text-2xl font-bold text-white mb-2">Recover Access</h2>
      <p class="text-[#768dad] text-sm mb-6">Enter your email and we'll send a secure reset link to your inbox.</p>

      <form id="forgotForm" class="space-y-5">
        <div>
          <label class="text-xs font-semibold text-[#768dad] uppercase tracking-widest">Work Email</label>
          <input id="email" type="email" required placeholder="you@example.com"
            class="w-full mt-1 bg-[#000f22]/50 border border-white/10 rounded-xl py-4 px-4 text-white placeholder:text-[#768dad]/50 focus:outline-none focus:ring-2 focus:ring-[#0059bb]/50 focus:border-[#0059bb] transition-all"/>
        </div>
        <p id="err" class="text-red-400 text-sm hidden"></p>
        <p id="suc" class="text-[#009e76] text-sm hidden"></p>
        <button type="submit" id="submitBtn"
          class="w-full sig-grad text-white headline font-bold py-4 rounded-xl shadow-lg hover:scale-[1.01] active:scale-[.98] transition-all flex items-center justify-center gap-2">
          Send Reset Link
          <span style="font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">arrow_forward</span>
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/5 text-center">
        <a href="/public/login.html" class="inline-flex items-center gap-2 text-[#768dad] hover:text-white transition-colors text-sm">
          <span style="font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">chevron_left</span>
          Back to login
        </a>
      </div>
    </div>

    <div class="mt-8 flex items-center justify-center gap-3 text-[#768dad]/40">
      <span style="font-family:'Material Symbols Outlined';font-size:.875rem;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">encrypted</span>
      <span class="text-[10px] uppercase tracking-[.2em] font-bold">End-to-End Encrypted Recovery</span>
    </div>
  </div>
</main>

<footer class="bg-[#f8f9ff] border-t border-[#c4c6ce]/15 px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
  <span class="headline font-bold text-[#0A2540]">CyberEdge Academy</span>
  <div class="flex gap-6 text-sm text-slate-400">
    <a href="#" class="hover:text-[#007BFF]">Privacy Policy</a>
    <a href="#" class="hover:text-[#007BFF]">Terms</a>
    <a href="/public/contact.html" class="hover:text-[#007BFF]">Contact</a>
  </div>
  <span class="text-slate-400 text-xs">© 2024 CyberEdge Academy</span>
</footer>

<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const err = document.getElementById("err");
  const suc = document.getElementById("suc");
  err.classList.add("hidden"); suc.classList.add("hidden");
  btn.disabled = true; btn.textContent = "Sending...";

  const email = document.getElementById("email").value.trim();
  // redirectTo must match a URL in Supabase Auth > URL Configuration > Redirect URLs
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/public/reset-password.html"
  });

  btn.disabled = false; btn.textContent = "Send Reset Link";

  if (error) {
    err.textContent = error.message; err.classList.remove("hidden");
  } else {
    suc.textContent = "Reset link sent! Check your email inbox (and spam folder).";
    suc.classList.remove("hidden");
  }
});
</script>
</body>
</html>
