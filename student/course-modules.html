<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Course Modules | CyberEdge Academy</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/assets/js/app.js"></script><style>body{font-family:'Manrope',sans-serif}.headline{font-family:'Space Grotesk',sans-serif}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.sig-grad{background:linear-gradient(135deg,#007BFF 0%,#00C896 100%)}</style></head><body class="bg-[#f8f9ff]"><nav class="bg-[#0A2540] sticky top-0 z-50 px-8 py-4 flex items-center gap-4"><a href="/student/my-courses.html" class="text-[#768dad] hover:text-white"><span class="material-symbols-outlined">arrow_back</span></a><span class="headline font-bold text-white text-lg" id="course-title">Course Modules</span></nav><main class="max-w-3xl mx-auto px-6 py-12"><div class="space-y-4" id="modules"></div></main><script>const MODS=[{n:"Introduction & Foundations",topics:["Course Overview","Environment Setup","Core Concepts"]},{n:"Core Concepts & Architecture",topics:["Theory Deep-Dive","Hands-on Labs","Case Studies"]},{n:"Practical Labs",topics:["Lab 1: Setup","Lab 2: Implementation","Lab 3: Testing"]},{n:"Advanced Topics",topics:["Advanced Patterns","Optimization","Security"]},{n:"Industry Tools & Frameworks",topics:["Tool Overview","Integration","Best Practices"]},{n:"Final Project",topics:["Project Brief","Submission Guidelines","Evaluation Criteria"]}];async function init(){const user=await requireAuth("/public/login.html");if(!user)return;const courseId=new URLSearchParams(window.location.search).get("course");if(courseId){const{data}=await sb.from("courses").select("title").eq("id",courseId).single();if(data)document.getElementById("course-title").textContent=data.title;}document.getElementById("modules").innerHTML=MODS.map((m,i)=>`<details class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden group"><summary class="flex items-center justify-between p-6 cursor-pointer list-none"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-xl ${i<3?"sig-grad text-white":"bg-[#eff4ff] text-[#007BFF]"} flex items-center justify-center font-bold headline">${i<3?"✓":i+1}</div><div><p class="font-bold text-[#0A2540]">${m.n}</p><p class="text-xs text-slate-400">${m.topics.length} lessons</p></div></div><span class="material-symbols-outlined text-slate-400 group-open:rotate-180 transition-transform">expand_more</span></summary><div class="px-6 pb-6 space-y-2">${m.topics.map(t=>`<div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl hover:bg-[#eff4ff] transition-colors"><span class="material-symbols-outlined text-sm ${i<3?"text-[#009e76]":"text-slate-300"}">${i<3?"check_circle":"radio_button_unchecked"}</span><span class="text-sm font-bold text-[#0A2540]">${t}</span></div>`).join("")}</div></details>`).join("");}init();</script></body></html>
