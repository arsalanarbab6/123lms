<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enrollment Confirmed | CyberEdge Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/app.js"></script>
<style>
  body{font-family:'Manrope',sans-serif}
  .headline{font-family:'Space Grotesk',sans-serif}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
  .sig-grad{background:linear-gradient(135deg,#007BFF 0%,#00C896 100%)}
  .card-shine{position:relative;overflow:hidden}
  .card-shine::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%);pointer-events:none}
  @keyframes pulse-ring{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.6);opacity:0}}
  .pulse-ring{animation:pulse-ring 2s cubic-bezier(.215,.61,.355,1) infinite}
</style>
</head>
<body class="bg-[#f8f9ff] min-h-screen">

<main class="min-h-screen flex flex-col items-center justify-center px-6 py-16">
  <div class="w-full max-w-2xl">

    <!-- SUCCESS CARD -->
    <div class="bg-[#0A2540] rounded-3xl p-10 text-white text-center relative overflow-hidden mb-8 shadow-2xl card-shine">
      <div class="relative z-10">
        <!-- Pulsing icon -->
        <div class="relative inline-flex mb-8">
          <div class="w-24 h-24 rounded-full sig-grad flex items-center justify-center shadow-2xl">
            <span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">verified</span>
          </div>
          <div class="pulse-ring absolute inset-0 rounded-full border-4 border-[#00C896]"></div>
        </div>

        <p class="text-[#768dad] text-xs font-bold uppercase tracking-widest mb-3">Neon Academy</p>
        <h1 class="headline text-5xl font-bold mb-4">Enrollment<br/>Confirmed!</h1>
        <p class="text-[#d8e2ff] text-lg max-w-md mx-auto leading-relaxed">
          Welcome to the elite. Your journey in the CyberEdge training program has officially begun.
        </p>

        <!-- ID Card -->
        <div class="mt-8 bg-white/10 border border-white/10 rounded-2xl p-6 max-w-sm mx-auto text-left">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-full sig-grad flex items-center justify-center font-bold headline text-sm" id="avatar-init">?</div>
            <div>
              <p class="font-bold" id="student-name">Loading...</p>
              <p class="text-[#768dad] text-xs" id="student-email">-</p>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="bg-white/10 rounded-lg p-3">
              <p class="text-[#768dad] text-xs mb-1">Program</p>
              <p class="font-bold" id="course-name">-</p>
            </div>
            <div class="bg-white/10 rounded-lg p-3">
              <p class="text-[#768dad] text-xs mb-1">Batch</p>
              <p class="font-bold" id="batch-name">Cohort 2024</p>
            </div>
            <div class="bg-white/10 rounded-lg p-3">
              <p class="text-[#768dad] text-xs mb-1">Enrollment ID</p>
              <p class="font-bold text-[10px]" id="enrollment-id">-</p>
            </div>
            <div class="bg-white/10 rounded-lg p-3">
              <p class="text-[#768dad] text-xs mb-1">Status</p>
              <p class="font-bold text-[#00C896]">Active</p>
            </div>
          </div>
        </div>
      </div>

      <div class="absolute -bottom-20 -right-20 w-64 h-64 rounded-full bg-[#007BFF] opacity-10 blur-3xl"></div>
      <div class="absolute -top-20 -left-20 w-64 h-64 rounded-full bg-[#00C896] opacity-10 blur-3xl"></div>
    </div>

    <!-- SETUP CHECKLIST -->
    <div class="bg-white rounded-2xl p-8 border border-[#e5eeff] shadow-sm mb-6">
      <h2 class="headline text-xl font-bold text-[#0A2540] mb-6">Get Started — Quick Setup</h2>
      <div class="space-y-4">
        <label class="flex items-center gap-4 p-4 rounded-xl hover:bg-[#eff4ff] transition-colors cursor-pointer">
          <input type="checkbox" class="w-5 h-5 accent-[#007BFF]" id="chk1"/>
          <div>
            <p class="font-bold text-sm text-[#0A2540]">Access your Student Dashboard</p>
            <p class="text-xs text-[#768dad]">View your enrolled courses, assignments, and progress.</p>
          </div>
          <a href="/student/dashboard.html" class="ml-auto text-[#007BFF] text-sm font-bold hover:underline">Go →</a>
        </label>
        <label class="flex items-center gap-4 p-4 rounded-xl hover:bg-[#eff4ff] transition-colors cursor-pointer">
          <input type="checkbox" class="w-5 h-5 accent-[#007BFF]" id="chk2"/>
          <div>
            <p class="font-bold text-sm text-[#0A2540]">Complete your profile</p>
            <p class="text-xs text-[#768dad]">Add a photo, bio, and social links.</p>
          </div>
          <a href="/student/profile.html" class="ml-auto text-[#007BFF] text-sm font-bold hover:underline">Go →</a>
        </label>
        <label class="flex items-center gap-4 p-4 rounded-xl hover:bg-[#eff4ff] transition-colors cursor-pointer">
          <input type="checkbox" class="w-5 h-5 accent-[#007BFF]" id="chk3"/>
          <div>
            <p class="font-bold text-sm text-[#0A2540]">Attend the Live Intro Session</p>
            <p class="text-xs text-[#768dad]">Orientation scheduled. Check your email for the link.</p>
          </div>
        </label>
        <label class="flex items-center gap-4 p-4 rounded-xl hover:bg-[#eff4ff] transition-colors cursor-pointer">
          <input type="checkbox" class="w-5 h-5 accent-[#007BFF]" id="chk4"/>
          <div>
            <p class="font-bold text-sm text-[#0A2540]">Download the Mobile App</p>
            <p class="text-xs text-[#768dad]">Access courses and notifications on the go.</p>
          </div>
        </label>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="flex gap-4">
      <a href="/student/dashboard.html"
        class="flex-1 sig-grad text-white headline font-bold py-4 rounded-xl shadow-xl text-center hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">grid_view</span> Go to Dashboard
      </a>
      <button onclick="window.print()"
        class="flex-1 border-2 border-[#e5eeff] text-[#0A2540] headline font-bold py-4 rounded-xl hover:bg-[#eff4ff] transition-colors flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">print</span> Print Card
      </button>
    </div>
  </div>
</main>

<script>
async function init() {
  const user = await requireAuth("/public/login.html");
  if (!user) return;

  const profile = await getProfile(user.id);
  const name = profile?.full_name || user.email;
  const initials = name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0,2);

  document.getElementById("avatar-init").textContent  = initials;
  document.getElementById("student-name").textContent = name;
  document.getElementById("student-email").textContent = user.email;

  // Get enrollment
  const { data: enrollment } = await sb
    .from("enrollments")
    .select("*, courses(*)")
    .eq("student_id", user.id)
    .order("enrolled_at", { ascending: false })
    .limit(1)
    .single();

  if (enrollment) {
    document.getElementById("course-name").textContent    = enrollment.courses?.title || "CyberEdge Program";
    document.getElementById("enrollment-id").textContent  = enrollment.id.slice(0,8).toUpperCase();
    document.getElementById("batch-name").textContent     = "Cohort " + new Date(enrollment.enrolled_at).getFullYear();
  }
}
init();
</script>
</body>
</html>
